# Local development only — production uses Neon + Upstash + Meilisearch Cloud
services:
  postgres:
    image: postgres:16-alpine
    container_name: mizanly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mizanly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mizanly_dev}
      POSTGRES_DB: mizanly
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mizanly-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: mizanly-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-mizanly_dev_master_key}
      MEILI_ENV: development
    ports:
      - '127.0.0.1:7700:7700'
    volumes:
      - meilisearch_data:/meili_data

  # ── Application services (optional — for local Docker testing) ──

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mizanly-api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - meilisearch
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      DATABASE_URL: postgresql://mizanly:${POSTGRES_PASSWORD:-mizanly_dev}@postgres:5432/mizanly
      DIRECT_DATABASE_URL: postgresql://mizanly:${POSTGRES_PASSWORD:-mizanly_dev}@postgres:5432/mizanly
      REDIS_URL: redis://redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY:-mizanly_dev_master_key}
      NODE_ENV: development
    profiles:
      - app

  e2e-server:
    build:
      context: apps/e2e-server
      dockerfile: Dockerfile
    container_name: mizanly-e2e-server
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - '127.0.0.1:8080:8080'
    environment:
      DATABASE_URL: postgresql://mizanly:${POSTGRES_PASSWORD:-mizanly_dev}@postgres:5432/mizanly?sslmode=disable
      REDIS_URL: redis://redis:6379
    profiles:
      - app

  livekit-server:
    build:
      context: apps/livekit-server
      dockerfile: Dockerfile
    container_name: mizanly-livekit-server
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - '127.0.0.1:8081:8081'
    environment:
      DATABASE_URL: postgresql://mizanly:${POSTGRES_PASSWORD:-mizanly_dev}@postgres:5432/mizanly?sslmode=disable
      REDIS_URL: redis://redis:6379
    profiles:
      - app

volumes:
  postgres_data:
  meilisearch_data:
