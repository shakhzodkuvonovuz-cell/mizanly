name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate --schema=apps/api/prisma/schema.prisma
      - name: Typecheck API
        run: npx tsc --noEmit --project apps/api/tsconfig.json
      - name: Typecheck Mobile
        run: npm run typecheck --workspace=apps/mobile

  build-mobile:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Verify mobile dependencies installed
        run: node -e "require('expo/package.json'); require('react-native/package.json'); console.log('Mobile deps OK')"
        working-directory: apps/mobile

  test-api:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mizanly
          POSTGRES_PASSWORD: mizanly_test
          POSTGRES_DB: mizanly_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql://mizanly:mizanly_test@localhost:5432/mizanly_test
      DIRECT_DATABASE_URL: postgresql://mizanly:mizanly_test@localhost:5432/mizanly_test
      REDIS_URL: redis://localhost:6379
      CLERK_SECRET_KEY: test_secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate --schema=apps/api/prisma/schema.prisma
      - run: npm test --workspace=apps/api -- --passWithNoTests

  test-api-integration:
    runs-on: ubuntu-latest
    needs: test-api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mizanly
          POSTGRES_PASSWORD: mizanly_test
          POSTGRES_DB: mizanly_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql://mizanly:mizanly_test@localhost:5432/mizanly_test
      DIRECT_DATABASE_URL: postgresql://mizanly:mizanly_test@localhost:5432/mizanly_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate --schema=apps/api/prisma/schema.prisma
      - name: Push schema to test database
        run: npx prisma db push --schema=apps/api/prisma/schema.prisma --skip-generate --accept-data-loss --force-reset
      - name: Run integration tests
        run: npm run test:integration --workspace=apps/api -- --passWithNoTests --forceExit

  build-api:
    runs-on: ubuntu-latest
    needs: test-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate --schema=apps/api/prisma/schema.prisma
      - run: npm run build --workspace=apps/api

  # E2E Key Server (Go)
  e2e-server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/e2e-server/go.sum
      - name: Build E2E server
        run: cd apps/e2e-server && go build -o /dev/null ./cmd/server
      - name: Run E2E server tests
        run: cd apps/e2e-server && go test -v ./...
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          CLERK_SECRET_KEY: sk_test_placeholder