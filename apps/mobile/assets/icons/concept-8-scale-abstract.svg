<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    CONCEPT 8: "THE SCALE" (Abstract)
    The concept of a balance scale reduced to absolute minimalism.
    A horizontal line balanced perfectly on a point (triangle).
    Two circles hang from the ends — the pans.
    No ornament, no cultural reference. Pure geometry. Pure balance.
    Like the Spotify icon is just sound waves, this is just... balance.
    Meaning: Equilibrium, fairness, measure, center.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E9B5F"/>
      <stop offset="45%" stop-color="#0A7B4F"/>
      <stop offset="100%" stop-color="#06633C"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDD07A"/>
      <stop offset="40%" stop-color="#C8963E"/>
      <stop offset="100%" stop-color="#A67A2E"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#E8C46A"/>
      <stop offset="100%" stop-color="#B8882E"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.35">
      <stop offset="0%" stop-color="rgba(232,196,106,0.1)"/>
      <stop offset="100%" stop-color="rgba(200,150,62,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <circle cx="512" cy="460" r="300" fill="url(#glow)"/>

  <!-- Fulcrum — upward-pointing triangle -->
  <path
    d="M 512,380 L 548,440 L 476,440 Z"
    fill="url(#gold)"
  />

  <!-- Beam — horizontal bar -->
  <rect x="260" y="430" width="504" height="14" rx="7" fill="url(#gold)"/>

  <!-- Left chain -->
  <line x1="310" y1="444" x2="310" y2="560" stroke="url(#goldV)" stroke-width="6" stroke-linecap="round"/>

  <!-- Right chain -->
  <line x1="714" y1="444" x2="714" y2="560" stroke="url(#goldV)" stroke-width="6" stroke-linecap="round"/>

  <!-- Left pan — circle (outline) -->
  <circle cx="310" cy="600" r="56" fill="none" stroke="url(#gold)" stroke-width="10"/>

  <!-- Right pan — circle (outline) -->
  <circle cx="714" cy="600" r="56" fill="none" stroke="url(#gold)" stroke-width="10"/>

  <!-- Pillar — vertical line down from fulcrum -->
  <line x1="512" y1="440" x2="512" y2="680" stroke="url(#goldV)" stroke-width="8" stroke-linecap="round"/>

  <!-- Base -->
  <rect x="462" y="670" width="100" height="12" rx="6" fill="url(#gold)" opacity="0.7"/>
</svg>
